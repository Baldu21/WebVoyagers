<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVoyagers - Esplora il Mondo</title>
    <style>
        /* CSS INTEGRATO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #020205; /* Nero profondo */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Navbar solo con icona menu a destra */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: flex-end; /* Sposta tutto a destra */
            z-index: 100;
        }

        .menu-icon {
            cursor: pointer;
        }

        .menu-icon span {
            display: block;
            width: 25px;
            height: 2px;
            background: white;
            margin: 5px 0;
            transition: 0.3s;
        }

        /* Layout Principale */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 0 8%;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        /* Testo laterale sinistro */
        .hero-text {
            max-width: 280px;
            z-index: 10;
        }

        .hero-text p {
            font-size: 1rem;
            line-height: 1.6;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        .hero-text .cta {
            color: white;
            font-weight: 600;
            text-transform: none;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Centro: Titolo + Globo */
        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex-grow: 1;
        }

        .main-title {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            /* Gradiente come da immagine */
            background: linear-gradient(90deg, #e93db3 0%, #46e2be 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 60px; /* Spazio extra per non toccare il pianeta */
            filter: drop-shadow(0 0 15px rgba(233, 61, 179, 0.2));
            transition: transform 0.1s ease-out;
        }

        .globe-box {
            position: relative;
            width: 450px;
            height: 450px;
            transition: transform 0.1s ease-out;
        }

        .globe-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: saturate(1.2) brightness(1.1);
        }

        /* Effetto alone blu attorno al pianeta */
        .globe-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            box-shadow: inset 0 0 50px rgba(70, 226, 190, 0.3), 
                        0 0 40px rgba(99, 102, 241, 0.4);
            pointer-events: none;
        }

        /* Icone a destra */
        .right-sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .icon-btn:hover {
            opacity: 1;
        }

        /* Mobile Responsive base */
        @media (max-width: 768px) {
            .container { flex-direction: column; justify-content: center; text-align: center; }
            .hero-text { order: 3; margin-top: 40px; }
            .main-title { font-size: 3rem; margin-bottom: 20px; }
            .globe-box { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="container">
        <div class="hero-text">
            <p>Scopri le destinazioni più uniche e remote del globo. Raggiungi i confini che altri non osano esplorare.</p>
            <div class="cta">Scegli dove andare</div>
        </div>

        <div class="center-content">
            <h1 class="main-title" id="title">WebVoyagers</h1>
            <div class="globe-box" id="globe">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png" alt="Mondo" class="globe-img">
            </div>
        </div>

        <div class="right-sidebar">
            <button class="icon-btn">🔍</button>
            <button class="icon-btn">👤</button>
        </div>
    </div>

    <script>
        // JS INTEGRATO: Effetto Parallasse al movimento del mouse
        const globe = document.getElementById('globe');
        const title = document.getElementById('title');

        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 40;
            const moveY = (e.clientY - window.innerHeight / 2) / 40;

            // Il titolo si muove leggermente meno del globo per creare profondità
            globe.style.transform = `translate(${moveX}px, ${moveY}px)`;
            title.style.transform = `translate(${-moveX / 2}px, ${-moveY / 2}px)`;
        });
    </script>

</body>
</html>
