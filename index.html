<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVoyagers - Sette Meraviglie</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            overflow: hidden;
            color: white;
        }

        /* SFONDO DELLE SETTE MERAVIGLIE */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            /* Inserisco l'immagine delle sette meraviglie */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), 
                        url('https://images.unsplash.com/photo-1599946347371-68eb71b16afc?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            transform: scale(1.1); /* Necessario per l'effetto movimento */
            transition: transform 0.1s ease-out;
        }

        /* NAVBAR / MENU BURGER */
        .navbar {
            position: absolute;
            top: 30px;
            right: 40px;
            cursor: pointer;
            z-index: 10;
        }

        .burger span {
            display: block;
            width: 35px;
            height: 3px;
            background: white;
            margin: 6px 0;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* TITOLO CENTRALE IN ALTO */
        .header {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
        }

        .header h1 {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            /* Gradiente WebVoyagers */
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: white; /* In questo screen è bianco pieno */
        }

        /* CONTENUTO IN BASSO A SINISTRA */
        .main-content {
            position: absolute;
            bottom: 80px;
            left: 50px;
            max-width: 450px;
        }

        .main-content p {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
        }

        /* SELETTORE PAESE */
        .selector-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .selector-container label {
            font-size: 1.3rem;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
        }

        select {
            background: rgba(40, 40, 40, 0.9);
            color: white;
            padding: 12px 20px;
            border: 1px solid #555;
            border-radius: 8px;
            font-size: 1.1rem;
            width: 250px;
            cursor: pointer;
            outline: none;
        }

    </style>
</head>
<body>

    <div class="background-image" id="bg"></div>

    <div class="navbar">
        <div class="burger">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="header">
        <h1 id="title">WebVoyagers</h1>
    </div>

    <div class="main-content">
        <p>Scopri le destinazioni più uniche e remote del mondo<br>
        Raggiungi i confini che altri non osano esplorare</p>
        
        <div class="selector-container">
            <label>Paese:</label>
            <select>
                <option>Arabia Saudita</option>
                <option>Italia</option>
                <option>Egitto</option>
                <option>India</option>
                <option>Messico</option>
            </select>
        </div>
    </div>

    <script>
        const bg = document.getElementById('bg');
        const title = document.getElementById('title');

        // Effetto "Vivo": Lo sfondo e il titolo si muovono col mouse
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;

            // Muove lo sfondo in modo leggero
            bg.style.transform = `scale(1.1) translate(${x}px, ${y}px)`;
            
            // Muove il titolo per creare parallasse
            title.style.transform = `translate(${-x}px, ${-y}px)`;
        });
    </script>

</body>
</html>
