<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVoyagers - Esplora la Storia del Mondo</title>
    <style>
        /* RESET E BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* SFONDO CON IMMAGINE COLLAGE */
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/ea/Seven_Wonders_of_the_World.png'); /* URL ESEMPIO, sostiuisci con il tuo URL dell'immagine */
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Mantiene lo sfondo fisso allo scorrimento */
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; /* Mantiene l'esperienza full-screen */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* STRATO SCURO PER LEGGIBILITÀ (OPZIONALE MA CONSIGLIATO) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Leggera sfumatura scura */
            z-index: 1;
        }

        /* LAYOUT PRINCIPALE */
        .main-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 0 10%;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 2; /* Sopra l'overlay e lo sfondo */
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        /* Blur quando il menu è aperto */
        .main-wrapper.blur {
            filter: blur(10px);
            transform: scale(0.95);
            pointer-events: none;
        }

        /* Sezione di testo con sfondo sfocato per leggibilità */
        .hero-text-container {
            max-width: 350px;
            background: rgba(2, 2, 5, 0.6); /* Sfondo scuro semi-trasparente */
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px); /* Effetto sfocatura dietro il testo */
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hero-text-container p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #e0e0e0;
            margin-bottom: 35px;
        }

        .cta {
            color: white;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border-bottom: 2px solid #46e2be;
            display: inline-block;
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .cta:hover {
            color: #46e2be;
            border-bottom-color: #e93db3;
            letter-spacing: 1px;
        }

        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            /* Rimuoviamo il wrapper del globo qui */
        }
        
        .main-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: -3px;
            background: linear-gradient(90deg, #e93db3 0%, #46e2be 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 20px rgba(233, 61, 179, 0.2));
            text-align: center;
        }

        /* SIDEBAR DESTRA */
        .right-sidebar {
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.7; /* Aumentata opacità per visibilità sullo sfondo */
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            opacity: 1;
            transform: scale(1.2);
            color: #46e2be;
        }

        #countries-overlay {
            position: fixed;
