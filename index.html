<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVoyagers</title>
    <style>
        /* Ingrandisce il titolo principale */
        h1 {
            font-size: 3rem; /* Puoi aumentare questo valore se lo vuoi ancora più grande */
            margin-bottom: 10px;
        }

        /* Rimpicciolisce il sottotitolo */
        .sottotitolo {
            font-size: 1.1rem;
            font-weight: normal; /* Toglie il grassetto pesante */
            color: #555; /* Opzionale: un grigio scuro per staccare dal titolo */
            margin-top: 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h6>WebVoyagers - Esplora il Mondo</h6>

    <form action="#" method="post">
        <p class="sottotitolo">
            Scopri le destinazioni più uniche e remote del mondo.<br>
            Raggiungi confini che altri non osano esplorare.
        </p>

        <p>
            <label for="destinazione">Destinazione:</label>
            <select id="destinazione" name="Destinazione" required>
                <option value="" disabled selected>Scegli la tua destinazione...</option>
                <option value="Afghanistan">Afghanistan</option>
                <option value="Albania">Albania</option>
                <option value="Algeria">Algeria</option>
                <option value="Italia">Italia</option>
                <option value="Zimbabwe">Zimbabwe</option>
            </select>
        </p>
    </form>

</body>
</html>
