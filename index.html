    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
            line-height: 1.6;
            background-color: #f9f9f9;
        }

        /* Contenitore generale del menu in alto a destra */
        .menu-container {
            position: absolute; 
            top: 15px;
            right: 20px;
            display: inline-block;
            z-index: 1000;
        }

        /* Stile delle tre linette (Hamburger) */
        .hamburger {
            font-size: 35px;
            cursor: pointer;
            user-select: none;
            color: #333;
        }

        /* Stile del menu a comparsa */
        .menu-dropdown {
            display: none; 
            position: absolute;
            right: 0;
            background-color: #ffffff;
            min-width: 200px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* Classe attivata da JS per mostrare il menu */
        .menu-dropdown.show {
            display: block;
        }

        .menu-dropdown a {
            color: #333;
            padding: 14px 20px;
            text-decoration: none;
            display: block;
            font-size: 16px;
            border-bottom: 1px solid #eee;
        }

        .menu-dropdown a:last-child {
            border-bottom: none;
        }

        .menu-dropdown a:hover {
            background-color: #f1f1f1;
            color: #007bff;
        }

        /* Layout dei contenuti principali */
        .main-content {
            margin-top: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .intro-text {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box; /* Importante per non far uscire i bordi */
        }

        h2 {
            text-align: center;
            color: #222;
        }
    </style>
</head>

    <script>
        // Funzione per aprire/chiudere il menu
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Chiude il menu se l'utente clicca fuori
        window.onclick = function(event) {
            if (!event.target.matches('.hamburger')) {
                var dropdowns = document.getElementsByClassName("menu-dropdown");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
