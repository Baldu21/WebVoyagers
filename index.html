<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebVoyagers - Sette Meraviglie Vive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #020205; /* Nero profondo per contrasto */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Navbar solo con icona menu a destra */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: flex-end;
            z-index: 100;
        }

        .menu-icon {
            cursor: pointer;
        }

        .menu-icon span {
            display: block;
            width: 25px;
            height: 2px;
            background: white;
            margin: 5px 0;
            transition: 0.3s;
        }

        /* Layout Principale */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 0 8%;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        /* Testo laterale sinistro (rimasto com'era) */
        .hero-text {
            max-width: 280px;
            z-index: 10;
        }

        .hero-text p {
            font-size: 1rem;
            line-height: 1.6;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        .hero-text .cta {
            color: white;
            font-weight: 600;
            text-transform: none;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Centro: Titolo + "Sfondo Vivo" */
        .center-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex-grow: 1;
            height: 100vh; /* Occupa tutta l'altezza per lo sfondo */
        }

        .main-title {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #e93db3 0%, #46e2be 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 15vh; /* Posizionato in alto */
            z-index: 20; /* Sopra a tutto lo sfondo vivo */
            filter: drop-shadow(0 0 15px rgba(233, 61, 179, 0.2));
            transition: transform 0.1s ease-out;
            pointer-events: none; /* Non interferisce con il mouse */
        }

        /* Il contenitore dello sfondo vivo */
        .wonders-world {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            overflow: hidden;
            border-radius: 50px; /* Bordo arrotondato come il globo dell'immagine 0 */
            box-shadow: inset 0 0 100px rgba(70, 226, 190, 0.2), 
                        0 0 80px rgba(99, 102, 241, 0.3); /* Alone luminoso */
            transform: scale(0.9); /* Un po' più piccolo dell'intera finestra */
        }

        /* Immagine di sfondo statica di base */
        .base-wonders {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.6) saturate(1.2); /* Scurito per profondità */
            z-index: 1;
            opacity: 0.9;
        }

        /* Elementi ritagliati e "vivi" - sovrapposti */
        .wonder-item {
            position: absolute;
            object-fit: cover;
            object-position: top; /* Ritaglia dall'alto */
            z-index: 5;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
            animation: floatWonders 15s infinite ease-in-out;
            transition: transform 0.1s ease-out;
        }

        /* Posizioni specifiche dei ritagli vivo */
        .wonder-petra { width: 30%; height: 60%; bottom: 0; left: 0; } /* Sinistra - Petra */
        .wonder-machu { width: 30%; height: 40%; bottom: 10%; right: 0; } /* Destra - Machu Picchu */
        .wonder-colosseum { width: 45%; height: 45%; top: 25%; left: 27.5%; transform: scale(1.1); } /* Centro-alto - Colosseo (più vicino) */
        .wonder-taj { width: 30%; height: 35%; top: 5%; right: 35%; opacity: 0.8; } /* Centro-top - Taj Mahal */
        .wonder-chichen { width: 25%; height: 35%; bottom: 15%; left: 37.5%; opacity: 0.9; } /* Centro-basso - Chichen Itza */

        /* Animazione CSS per il fluttuamento "vivo" */
        @keyframes floatWonders {
            0%, 100% { transform: translateY(0) scale(1.0); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Icone a destra */
        .right-sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .icon-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="container">
        <div class="hero-text">
            <p>Scopri le destinazioni più uniche e remote del globo. Raggiungi i confini che altri non osano esplorare.</p>
            <div class="cta">Scegli dove andare</div>
        </div>

        <div class="center-content">
            <h1 class="main-title" id="title">WebVoyagers</h1>
            
            <div class="wonders-world" id="wondersWorld">
                <img src="https://image.ibb.co/b9M5Gf/wonders-base.png" alt="Sfondo Sette Meraviglie" class="base-wonders">

                <img src="https://image.ibb.co/iKxG5f/colosseum-cut.png" alt="Colosseo" class="wonder-item wonder-colosseum">
                <img src="https://image.ibb.co/hL4X5f/petra-cut.png" alt="Petra" class="wonder-item wonder-petra">
                <img src="https://image.ibb.co/gN4X5f/machu-cut.png" alt="Machu Picchu" class="wonder-item wonder-machu">
                <img src="https://image.ibb.co/d8M5Gf/taj-cut.png" alt="Taj Mahal" class="wonder-item wonder-taj">
                <img src="https://image.ibb.co/jYxG5f/chichen-cut.png" alt="Chichen Itza" class="wonder-item wonder-chichen">
            </div>
        </div>

        <div class="right-sidebar">
            <button class="icon-btn">🔍</button>
            <button class="icon-btn">👤</button>
        </div>
    </div>

    <script>
        const wondersWorld = document.getElementById('wondersWorld');
        const wonders = document.querySelectorAll('.wonder-item');
        const title = document.getElementById('title');

        // JS: Effetto Parallasse Profonda
        document.addEventListener('mousemove', (e) => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const moveX = (e.clientX - centerX) / 50;
            const moveY = (e.clientY - centerY) / 50;

            // Il titolo si muove poco (sfondo)
            title.style.transform = `translate(${moveX / 2}px, ${moveY / 2}px)`;

            // Gli elementi "vivi" si muovono di più, a diverse intensità per la profondità
            wonders.forEach(wonder => {
                let speed = 20; // Default
                if (wonder.classList.contains('wonder-colosseum')) speed = 40; // Più vicino
                if (wonder.classList.contains('wonder-petra')) speed = 30;
                if (wonder.classList.contains('wonder-machu')) speed = 30;
                
                wonder.style.transform = `translate(${moveX / speed}px, ${moveY / speed}px) scale(${1.0 + Math.abs(moveX)/1000})`; // Aggiunto piccolo zoom
            });
        });
    </script>

</body>
</html>
